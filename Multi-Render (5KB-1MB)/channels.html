<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Channels – LooTube</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Lexend:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#00a550;--green-dark:#007a3d;--green-light:#e6f7ef;--gray-100:#f9f9f9;--gray-200:#f2f2f2;--gray-300:#e5e5e5;--gray-500:#aaaaaa;--gray-600:#717171;--gray-800:#212121;--header-h:56px}
body{font-family:'Roboto',sans-serif;background:#fff;color:#222;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
header{height:var(--header-h);background:#fff;border-bottom:1px solid var(--gray-300);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;align-items:center;gap:6px}
.logo-img{width:28px;height:28px;border-radius:6px}
.logo-text{font-family:'Archivo Black',sans-serif;font-size:20px;color:var(--green)}
.logo-text span{color:var(--gray-800)}
.header-nav{display:flex;gap:8px;margin-left:auto;align-items:center}
.header-nav a{font-size:13px;color:var(--gray-600);padding:6px 12px;border-radius:8px;transition:background .15s}
.header-nav a:hover{background:var(--gray-200)}
main{flex:1;max-width:1100px;margin:32px auto;width:100%;padding:0 24px}
h2{font-family:'Archivo Black',sans-serif;font-size:26px;color:var(--gray-800);margin-bottom:6px}
.sub{font-size:14px;color:var(--gray-600);margin-bottom:28px}
.search-bar{display:flex;gap:0;margin-bottom:28px;max-width:500px}
.search-bar input{flex:1;padding:10px 16px;border:1.5px solid var(--gray-300);border-right:none;border-radius:10px 0 0 10px;font-family:'Roboto',sans-serif;font-size:14px;outline:none}
.search-bar input:focus{border-color:var(--green)}
.search-bar button{padding:10px 18px;background:var(--green);color:#fff;border:none;border-radius:0 10px 10px 0;cursor:pointer;font-family:'Roboto',sans-serif;font-size:14px;font-weight:600}
.channels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.channel-card{border:1px solid var(--gray-300);border-radius:14px;overflow:hidden;transition:box-shadow .2s,transform .15s;cursor:pointer}
.channel-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);transform:translateY(-2px)}
.channel-banner{height:80px;background:linear-gradient(135deg,var(--green-dark),#00c060);position:relative}
.channel-body{padding:0 16px 20px;text-align:center;position:relative}
.ch-avatar{width:64px;height:64px;border-radius:50%;background:var(--green);color:#fff;font-weight:700;font-size:22px;display:flex;align-items:center;justify-content:center;margin:-32px auto 10px;border:3px solid #fff;position:relative;z-index:1}
.ch-name{font-weight:700;font-size:16px;color:var(--gray-800);margin-bottom:3px}
.ch-handle{font-size:12px;color:var(--gray-500);margin-bottom:8px}
.ch-desc{font-size:13px;color:var(--gray-600);margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:36px}
.ch-stats{display:flex;justify-content:center;gap:20px;margin-bottom:14px}
.ch-stat{font-size:12px;color:var(--gray-600);text-align:center}
.ch-stat strong{display:block;font-size:14px;font-weight:700;color:var(--gray-800)}
.sub-btn{width:100%;padding:9px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Roboto',sans-serif;transition:background .15s}
.sub-btn:hover{background:var(--green-dark)}
.sub-btn.subscribed{background:#fff;color:var(--gray-800);border:1.5px solid var(--gray-300)}
.sub-btn.subscribed:hover{background:var(--gray-200)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gray-800);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
footer{padding:20px 24px;text-align:center;font-size:12px;color:var(--gray-500);border-top:1px solid var(--gray-300)}
footer a{color:var(--gray-500);margin:0 8px}footer a:hover{color:var(--green)}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo-wrap"><img src="favicon.ico" alt="LooTube" class="logo-img"><span class="logo-text">Loo<span>Tube</span></span></a>
  <div class="header-nav"><a href="index.html">Home</a><a href="videocomment.html">Videos</a><a href="myaccount.html">My Account</a><a href="logout.html">Logout</a></div>
</header>
<main>
  <h2>Channels</h2>
  <p class="sub">Discover amazing creators on LooTube</p>
  <div class="search-bar">
    <input type="text" id="chSearch" placeholder="Search channels..." oninput="channels()">
    <button onclick="channels()">Search</button>
  </div>
  <div class="channels-grid" id="channelsGrid"></div>
</main>
<footer><a href="index.html">Home</a><a href="videocomment.html">Videos</a><span>© 2025 LooTube</span></footer>
<div class="toast" id="toast"></div>
<script>
const channelData=[
  {name:"BuildWithBen",handle:"@buildwithben",desc:"DIY, construction, and home building projects. Building my dream one video at a time.",subs:"84K",vids:"128",views:"2.1M",color:"#1976d2"},
  {name:"NomadNadia",handle:"@nomadnadia",desc:"Travel vlogging from every corner of the world. New adventures every week!",subs:"210K",vids:"345",views:"8.9M",color:"#e53935"},
  {name:"ArtWalks",handle:"@artwalks",desc:"Exploring street art, murals, and urban creativity in cities worldwide.",subs:"45K",vids:"89",views:"1.2M",color:"#7b1fa2"},
  {name:"CookingWithCarla",handle:"@cookingwithcarla",desc:"Easy, delicious recipes for everyone. From quick weeknight dinners to impressive feasts.",subs:"520K",vids:"612",views:"18.4M",color:"#f57c00"},
  {name:"CineCreator",handle:"@cinecreator",desc:"Independent filmmaker sharing short films, tutorials, and behind-the-scenes content.",subs:"98K",vids:"203",views:"4.7M",color:"#00796b"},
  {name:"DevDiary",handle:"@devdiary",desc:"A developer's daily life: coding, coffee, and everything in between.",subs:"67K",vids:"156",views:"2.9M",color:"#5d4037"},
  {name:"PaintingPaula",handle:"@paintingpaula",desc:"Watercolor, oil, and acrylic painting tutorials for all skill levels.",subs:"180K",vids:"289",views:"6.3M",color:"#e91e63"},
  {name:"CinephileClub",handle:"@cinephileclub",desc:"Film reviews, analysis, and recommendations for passionate movie lovers.",subs:"134K",vids:"178",views:"5.1M",color:"#455a64"},
];
let subs=new Set();
function channels(){
  const q=document.getElementById('chSearch').value.toLowerCase();
  const filtered=channelData.filter(c=>c.name.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q));
  const grid=document.getElementById('channelsGrid');
  grid.innerHTML='';
  filtered.forEach((c,i)=>{
    const subbed=subs.has(i);
    grid.innerHTML+=`<div class="channel-card">
      <div class="channel-banner" style="background:linear-gradient(135deg,${c.color},${c.color}99)"></div>
      <div class="channel-body">
        <div class="ch-avatar" style="background:${c.color}">${c.name[0]}</div>
        <div class="ch-name">${c.name}</div>
        <div class="ch-handle">${c.handle}</div>
        <div class="ch-desc">${c.desc}</div>
        <div class="ch-stats">
          <div class="ch-stat"><strong>${c.subs}</strong>Subscribers</div>
          <div class="ch-stat"><strong>${c.vids}</strong>Videos</div>
          <div class="ch-stat"><strong>${c.views}</strong>Views</div>
        </div>
        <button class="sub-btn${subbed?' subscribed':''}" onclick="toggleSub(${i},this)">${subbed?'Subscribed':'Subscribe'}</button>
      </div>
    </div>`;
  });
}
function toggleSub(i,btn){
  if(subs.has(i)){subs.delete(i);btn.textContent='Subscribe';btn.classList.remove('subscribed');}
  else{subs.add(i);btn.textContent='Subscribed';btn.classList.add('subscribed');showToast('Subscribed!');}
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
channels();
</script>
</body>
</html>
