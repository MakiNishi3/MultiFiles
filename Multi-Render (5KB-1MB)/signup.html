<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account – LooTube</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Lexend:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#00a550;--green-dark:#007a3d;--green-light:#e6f7ef;--gray-200:#f2f2f2;--gray-300:#e5e5e5;--gray-500:#aaaaaa;--gray-600:#717171;--gray-800:#212121}
body{font-family:'Roboto',sans-serif;background:#fff;color:#222;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
header{height:56px;background:#fff;border-bottom:1px solid var(--gray-300);display:flex;align-items:center;padding:0 24px;gap:8px}
.logo-wrap{display:flex;align-items:center;gap:6px}
.logo-img{width:28px;height:28px;border-radius:6px}
.logo-text{font-family:'Archivo Black',sans-serif;font-size:20px;color:var(--green)}
.logo-text span{color:var(--gray-800)}
main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px}
.card{width:100%;max-width:480px;background:#fff;border:1px solid var(--gray-300);border-radius:16px;padding:40px 36px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.card h2{font-family:'Archivo Black',sans-serif;font-size:26px;color:var(--gray-800);margin-bottom:6px}
.card .sub{font-size:14px;color:var(--gray-600);margin-bottom:28px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--gray-800);margin-bottom:6px}
.field input,.field select{width:100%;padding:11px 14px;border:1.5px solid var(--gray-300);border-radius:10px;font-family:'Roboto',sans-serif;font-size:15px;outline:none;transition:border-color .15s;background:#fff}
.field input:focus,.field select:focus{border-color:var(--green)}
.field input.error-field{border-color:#e53935}
.error-msg{display:none;color:#e53935;font-size:13px;margin-bottom:14px;background:#fdecea;padding:10px 14px;border-radius:8px}
.error-msg.show{display:block}
.success-msg{display:none;color:#1b5e20;font-size:13px;margin-bottom:14px;background:#e8f5e9;padding:10px 14px;border-radius:8px}
.success-msg.show{display:block}
.btn-primary{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Roboto',sans-serif;transition:background .15s;margin-top:4px}
.btn-primary:hover{background:var(--green-dark)}
.check-wrap{display:flex;align-items:flex-start;gap:10px;margin-bottom:18px;font-size:13px;color:var(--gray-600)}
.check-wrap input{margin-top:2px;accent-color:var(--green);width:16px;height:16px;flex-shrink:0;cursor:pointer}
.check-wrap a{color:var(--green)}
.check-wrap a:hover{text-decoration:underline}
.links{text-align:center;font-size:13px;margin-top:20px;color:var(--gray-600)}
.links a{color:var(--green)}
.links a:hover{text-decoration:underline}
.strength-bar{height:4px;border-radius:2px;margin-top:6px;background:var(--gray-300);overflow:hidden}
.strength-fill{height:100%;border-radius:2px;width:0%;transition:width .3s,background .3s}
footer{padding:20px 24px;text-align:center;font-size:12px;color:var(--gray-500);border-top:1px solid var(--gray-300)}
footer a{color:var(--gray-500);margin:0 8px}
footer a:hover{color:var(--green)}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo-wrap">
    <img src="favicon.ico" alt="LooTube" class="logo-img">
    <span class="logo-text">Loo<span>Tube</span></span>
  </a>
</header>
<main>
  <div class="card">
    <h2>Create Account</h2>
    <p class="sub">Join LooTube and share your world</p>
    <div id="errorMsg" class="error-msg">Please fill all the fields required</div>
    <div id="successMsg" class="success-msg">Account created successfully! Redirecting...</div>
    <div class="row">
      <div class="field">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" placeholder="First name">
      </div>
      <div class="field">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" placeholder="Last name">
      </div>
    </div>
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Choose a username">
    </div>
    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>
    <div class="field">
      <label for="dob">Date of Birth</label>
      <input type="date" id="dob">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Create a password" oninput="strengthCheck(this.value)">
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    </div>
    <div class="field">
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat your password">
    </div>
    <div class="check-wrap">
      <input type="checkbox" id="terms">
      <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
    </div>
    <button class="btn-primary" onclick="signuperror()">Create Account</button>
    <div class="links">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</main>
<footer>
  <a href="index.html">Home</a>
  <a href="login.html">Login</a>
  <span>© 2025 LooTube</span>
</footer>
<script>
function signuperror(){
  const fields=['firstName','lastName','username','email','dob','password','confirm'];
  const err=document.getElementById('errorMsg');
  const suc=document.getElementById('successMsg');
  err.classList.remove('show');
  suc.classList.remove('show');
  let hasError=false;
  fields.forEach(id=>{
    const el=document.getElementById(id);
    el.classList.remove('error-field');
    if(!el.value.trim()){el.classList.add('error-field');hasError=true;}
  });
  if(hasError){
    err.textContent='Please fill all the fields required';
    err.classList.add('show');return;
  }
  const pw=document.getElementById('password').value;
  const cf=document.getElementById('confirm').value;
  if(pw!==cf){
    document.getElementById('password').classList.add('error-field');
    document.getElementById('confirm').classList.add('error-field');
    err.textContent='Passwords do not match';
    err.classList.add('show');return;
  }
  if(pw.length<6){
    document.getElementById('password').classList.add('error-field');
    err.textContent='Password must be at least 6 characters';
    err.classList.add('show');return;
  }
  if(!document.getElementById('terms').checked){
    err.textContent='Please accept the Terms of Service';
    err.classList.add('show');return;
  }
  suc.classList.add('show');
  setTimeout(()=>location.href='login.html',2000);
}
function strengthCheck(val){
  const fill=document.getElementById('strengthFill');
  let score=0;
  if(val.length>=6)score++;
  if(val.length>=10)score++;
  if(/[A-Z]/.test(val))score++;
  if(/[0-9]/.test(val))score++;
  if(/[^A-Za-z0-9]/.test(val))score++;
  const pct=[0,20,40,60,80,100][score];
  const colors=['','#e53935','#ff7043','#fdd835','#43a047','#00a550'][score];
  fill.style.width=pct+'%';
  fill.style.background=colors;
}
</script>
</body>
</html>
