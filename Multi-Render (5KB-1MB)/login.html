<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – LooTube</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Lexend:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#00a550;--green-dark:#007a3d;--green-light:#e6f7ef;--gray-200:#f2f2f2;--gray-300:#e5e5e5;--gray-500:#aaaaaa;--gray-600:#717171;--gray-800:#212121}
body{font-family:'Roboto',sans-serif;background:#fff;color:#222;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
header{height:56px;background:#fff;border-bottom:1px solid var(--gray-300);display:flex;align-items:center;padding:0 24px;gap:8px}
.logo-wrap{display:flex;align-items:center;gap:6px}
.logo-img{width:28px;height:28px;border-radius:6px}
.logo-text{font-family:'Archivo Black',sans-serif;font-size:20px;color:var(--green)}
.logo-text span{color:var(--gray-800)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px}
.card{width:100%;max-width:420px;background:#fff;border:1px solid var(--gray-300);border-radius:16px;padding:40px 36px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.card h2{font-family:'Archivo Black',sans-serif;font-size:26px;color:var(--gray-800);margin-bottom:6px}
.card .sub{font-size:14px;color:var(--gray-600);margin-bottom:28px}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--gray-800);margin-bottom:6px}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--gray-300);border-radius:10px;font-family:'Roboto',sans-serif;font-size:15px;outline:none;transition:border-color .15s;background:#fff}
.field input:focus{border-color:var(--green)}
.field input.error-field{border-color:#e53935}
.error-msg{display:none;color:#e53935;font-size:13px;margin-top:6px;background:#fdecea;padding:10px 14px;border-radius:8px}
.error-msg.show{display:block}
.btn-primary{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Roboto',sans-serif;transition:background .15s;margin-top:4px}
.btn-primary:hover{background:var(--green-dark)}
.divider{text-align:center;color:var(--gray-500);font-size:13px;margin:20px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--gray-300)}
.divider::before{left:0}.divider::after{right:0}
.links{display:flex;justify-content:space-between;font-size:13px;margin-top:20px}
.links a{color:var(--green)}
.links a:hover{text-decoration:underline}
footer{padding:20px 24px;text-align:center;font-size:12px;color:var(--gray-500);border-top:1px solid var(--gray-300)}
footer a{color:var(--gray-500);margin:0 8px}
footer a:hover{color:var(--green)}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo-wrap">
    <img src="favicon.ico" alt="LooTube" class="logo-img">
    <span class="logo-text">Loo<span>Tube</span></span>
  </a>
</header>
<main>
  <div class="card">
    <h2>Sign in</h2>
    <p class="sub">Welcome back to LooTube</p>
    <div id="errorMsg" class="error-msg">Sorry login is incorrect</div>
    <div class="field">
      <label for="email">Email or Username</label>
      <input type="text" id="email" placeholder="Enter your email or username" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="login()">Sign In</button>
    <div class="divider">or</div>
    <div class="links">
      <a href="signup.html">Create account</a>
      <a href="#" onclick="forgotPassword();return false;">Forgot password?</a>
    </div>
  </div>
</main>
<footer>
  <a href="index.html">Home</a>
  <a href="accsettings.html">Settings</a>
  <a href="signup.html">Sign Up</a>
  <span>© 2025 LooTube</span>
</footer>
<script>
function login(){
  const email=document.getElementById('email');
  const password=document.getElementById('password');
  const err=document.getElementById('errorMsg');
  email.classList.remove('error-field');
  password.classList.remove('error-field');
  err.classList.remove('show');
  if(!email.value.trim()||!password.value.trim()){
    if(!email.value.trim())email.classList.add('error-field');
    if(!password.value.trim())password.classList.add('error-field');
    err.textContent='Sorry login is incorrect';
    err.classList.add('show');
    return;
  }
  const validUsers=[
    {u:'user@lootube.com',p:'password123'},
    {u:'admin',p:'admin'},
  ];
  const match=validUsers.some(v=>(v.u===email.value.trim())&&v.p===password.value);
  if(!match){
    email.classList.add('error-field');
    password.classList.add('error-field');
    err.textContent='Sorry login is incorrect';
    err.classList.add('show');
    return;
  }
  sessionStorage.setItem('loggedIn','true');
  sessionStorage.setItem('username',email.value.trim());
  location.href='myaccount.html';
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login()});
function forgotPassword(){
  const email=document.getElementById('email').value.trim();
  if(!email){alert('Please enter your email first.');return;}
  alert('If an account with that email exists, a reset link has been sent.');
}
</script>
</body>
</html>
