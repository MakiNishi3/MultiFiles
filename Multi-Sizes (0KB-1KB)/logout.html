<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logout – LooTube</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Lexend:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#00a550;--green-dark:#007a3d;--gray-300:#e5e5e5;--gray-500:#aaaaaa;--gray-600:#717171;--gray-800:#212121}
body{font-family:'Roboto',sans-serif;background:#fff;color:#222;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
header{height:56px;background:#fff;border-bottom:1px solid var(--gray-300);display:flex;align-items:center;padding:0 24px}
.logo-wrap{display:flex;align-items:center;gap:6px}
.logo-img{width:28px;height:28px;border-radius:6px}
.logo-text{font-family:'Archivo Black',sans-serif;font-size:20px;color:var(--green)}
.logo-text span{color:var(--gray-800)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px}
.card{width:100%;max-width:400px;background:#fff;border:1px solid var(--gray-300);border-radius:16px;padding:48px 36px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.icon-wrap{width:72px;height:72px;border-radius:50%;background:#fdecea;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.icon-wrap svg{width:36px;height:36px;fill:#e53935}
h2{font-family:'Archivo Black',sans-serif;font-size:24px;color:var(--gray-800);margin-bottom:8px}
p{font-size:15px;color:var(--gray-600);margin-bottom:28px}
.btn-danger{width:100%;padding:13px;background:#e53935;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Roboto',sans-serif;transition:background .15s;margin-bottom:12px}
.btn-danger:hover{background:#c62828}
.btn-secondary{width:100%;padding:13px;background:#fff;color:var(--gray-800);border:1.5px solid var(--gray-300);border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Roboto',sans-serif;transition:background .15s}
.btn-secondary:hover{background:#f5f5f5}
.status-msg{margin-top:18px;font-size:14px;color:var(--gray-600);display:none}
.status-msg.show{display:block}
footer{padding:20px 24px;text-align:center;font-size:12px;color:var(--gray-500);border-top:1px solid var(--gray-300)}
footer a{color:var(--gray-500);margin:0 8px}
footer a:hover{color:var(--green)}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo-wrap">
    <img src="favicon.ico" alt="LooTube" class="logo-img">
    <span class="logo-text">Loo<span>Tube</span></span>
  </a>
</header>
<main>
  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="#e53935" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h2>Sign Out</h2>
    <p>Are you sure you want to sign out of your LooTube account?</p>
    <button class="btn-danger" onclick="logout()">Yes, Sign Out</button>
    <button class="btn-secondary" onclick="location.href='index.html'">Cancel</button>
    <div class="status-msg" id="statusMsg">Signing out... You will be redirected.</div>
  </div>
</main>
<footer>
  <a href="index.html">Home</a>
  <a href="login.html">Login</a>
  <a href="signup.html">Sign Up</a>
  <span>© 2025 LooTube</span>
</footer>
<script>
function logout(){
  sessionStorage.clear();
  localStorage.removeItem('lootube_user');
  const msg=document.getElementById('statusMsg');
  msg.classList.add('show');
  setTimeout(()=>location.href='login.html',1500);
}
</script>
</body>
</html>
